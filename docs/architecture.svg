<svg width="100%" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">

  <!-- Background -->
  <rect width="900" height="600" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#2c2c2a">ph-economic-tracker — Pipeline Architecture</text>

  <!-- ── ROW 1: Data Sources ─────────────────────────────────────────── -->
  <text x="450" y="60" text-anchor="middle" font-size="11" fill="#888780" letter-spacing="1">DATA SOURCES</text>

  <!-- PSA -->
  <rect x="30" y="68" width="240" height="62" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text x="150" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#993C1D">PSA OpenSTAT</text>
  <text x="150" y="107" text-anchor="middle" font-size="11" fill="#712B13">CPI monthly (2018=100)</text>
  <text x="150" y="121" text-anchor="middle" font-size="11" fill="#712B13">CPI YoY inflation rate</text>

  <!-- World Bank -->
  <rect x="330" y="68" width="240" height="62" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="450" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#854F0B">World Bank WDI</text>
  <text x="450" y="107" text-anchor="middle" font-size="11" fill="#633806">GDP · CPI · Employment</text>
  <text x="450" y="121" text-anchor="middle" font-size="11" fill="#633806">OFW Remittances (USD + %GDP)</text>

  <!-- BSP -->
  <rect x="630" y="68" width="240" height="62" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="750" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#444441">BSP (optional)</text>
  <text x="750" y="107" text-anchor="middle" font-size="11" fill="#5F5E5A">Monthly remittance CSV</text>
  <text x="750" y="121" text-anchor="middle" font-size="11" fill="#5F5E5A">Graceful fallback if absent</text>

  <!-- Arrows down to ingestion -->
  <line x1="150" y1="130" x2="150" y2="158" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="130" x2="450" y2="158" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="750" y1="130" x2="750" y2="158" stroke="#888780" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-dash)"/>

  <!-- ── ROW 2: Ingestion ────────────────────────────────────────────── -->
  <rect x="30" y="160" width="840" height="70" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="450" y="183" text-anchor="middle" font-size="13" font-weight="700" fill="#085041">Ingestion Layer</text>
  <text x="220" y="202" text-anchor="middle" font-size="11" fill="#0F6E56">ingestion/psa.py</text>
  <line x1="310" y1="197" x2="310" y2="220" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="450" y="202" text-anchor="middle" font-size="11" fill="#0F6E56">ingestion/worldbank.py</text>
  <line x1="590" y1="197" x2="590" y2="220" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="720" y="202" text-anchor="middle" font-size="11" fill="#0F6E56">ingestion/bsp.py</text>
  <text x="450" y="220" text-anchor="middle" font-size="10" fill="#1D9E75">Pydantic v2 validation → EconomicIndicator · OFWRemittance models</text>

  <!-- Arrow down -->
  <line x1="450" y1="230" x2="450" y2="256" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="460" y="246" font-size="10" fill="#888780">upsert</text>

  <!-- ── ROW 3: PostgreSQL ───────────────────────────────────────────── -->
  <rect x="30" y="258" width="840" height="68" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
  <text x="450" y="280" text-anchor="middle" font-size="13" font-weight="700" fill="#042C53">PostgreSQL 16 — raw schema</text>
  <!-- Table tags -->
  <rect x="130" y="290" width="240" height="24" rx="5" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
  <text x="250" y="306" text-anchor="middle" font-size="11" fill="#042C53">raw.economic_indicators</text>
  <rect x="530" y="290" width="200" height="24" rx="5" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
  <text x="630" y="306" text-anchor="middle" font-size="11" fill="#042C53">raw.ofw_remittances</text>
  <text x="450" y="320" text-anchor="middle" font-size="10" fill="#185FA5">ON CONFLICT (source, series_code, period_date) DO UPDATE — idempotent</text>

  <!-- Arrow down -->
  <line x1="450" y1="326" x2="450" y2="352" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="460" y="342" font-size="10" fill="#888780">dbt run</text>

  <!-- ── ROW 4: dbt ──────────────────────────────────────────────────── -->
  <rect x="30" y="354" width="840" height="78" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="450" y="375" text-anchor="middle" font-size="13" font-weight="700" fill="#412402">dbt-postgres transforms</text>

  <!-- staging -->
  <rect x="50" y="383" width="370" height="36" rx="5" fill="#FAC775" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="120" y="397" font-size="11" font-weight="700" fill="#412402">staging/ (views)</text>
  <text x="120" y="412" font-size="10" fill="#633806">stg_economic_indicators · stg_ofw_remittances</text>

  <!-- marts -->
  <rect x="440" y="383" width="410" height="36" rx="5" fill="#FAC775" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="510" y="397" font-size="11" font-weight="700" fill="#412402">marts/ (tables)</text>
  <text x="510" y="412" font-size="10" fill="#633806">gdp_trend · cpi_trend · remittance_trend · economic_dashboard</text>

  <!-- Arrows down to outputs -->
  <line x1="270" y1="432" x2="210" y2="460" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="630" y1="432" x2="690" y2="460" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── ROW 5: Outputs ─────────────────────────────────────────────── -->
  <!-- Streamlit -->
  <rect x="30" y="462" width="360" height="68" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
  <text x="210" y="484" text-anchor="middle" font-size="13" font-weight="700" fill="#26215C">Streamlit Dashboard</text>
  <text x="210" y="501" text-anchor="middle" font-size="11" fill="#3C3489">localhost:8501</text>
  <text x="210" y="518" text-anchor="middle" font-size="10" fill="#534AB7">GDP · CPI · OFW charts + metric cards</text>
  <text x="210" y="530" text-anchor="middle" font-size="10" fill="#534AB7">Year filter · CSV download</text>

  <!-- Adminer -->
  <rect x="510" y="462" width="360" height="68" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="690" y="484" text-anchor="middle" font-size="13" font-weight="700" fill="#2C2C2A">Adminer DB Browser</text>
  <text x="690" y="501" text-anchor="middle" font-size="11" fill="#5F5E5A">localhost:8080</text>
  <text x="690" y="518" text-anchor="middle" font-size="10" fill="#888780">Browse raw · staging · marts</text>
  <text x="690" y="530" text-anchor="middle" font-size="10" fill="#888780">Query tables directly</text>

  <!-- Footer -->
  <text x="450" y="570" text-anchor="middle" font-size="10" fill="#B4B2A9">docker compose up postgres adminer -d  →  docker compose run --rm app ingest  →  docker compose up streamlit -d</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-dash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#B4B2A9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

</svg>
